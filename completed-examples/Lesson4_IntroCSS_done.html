<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Mi primer CSS</title>
    <style>
      /* Estilo para toda la página */
      body {
        font-family: Arial, sans-serif;
        background-color: #f0f4f8;
      }

      /* Estilo para el título principal */
      h1 {
        color: #1d4ed8;
      }

      /* Estilo para los párrafos */
      p {
        color: #333333;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <h1>Mi página con estilo</h1>
    <p>Ahora el texto tiene color, tipografía y un fondo agradable.</p>
    <p>El CSS controla cómo se ve cada elemento de la página.</p>
  </body>
</html>
