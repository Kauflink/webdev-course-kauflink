<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Página de perfil</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #eef2f7;
        margin: 0;
        padding: 40px;
      }

      /* Tarjeta centrada con borde y sombra */
      .tarjeta {
        max-width: 400px;
        margin: 0 auto; /* centra la tarjeta horizontalmente */
        background-color: #ffffff;
        border: 2px solid #1d4ed8;
        border-radius: 12px;
        padding: 24px;
        text-align: center;
      }

      .tarjeta img {
        width: 120px;
        height: 120px;
        border-radius: 50%; /* foto redonda */
        object-fit: cover;
      }

      .tarjeta h1 {
        color: #1d4ed8;
        margin-bottom: 4px;
      }

      .tarjeta p {
        color: #444444;
      }

      .etiquetas span {
        display: inline-block;
        background-color: #dbeafe;
        color: #1d4ed8;
        border-radius: 999px;
        padding: 4px 12px;
        margin: 4px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="tarjeta">
      <img src="https://picsum.photos/200" alt="Foto de perfil" />
      <h1>Ana Torres</h1>
      <p>Estudiante de secundaria · 15 años</p>
      <p>Me encanta dibujar, programar y la astronomía.</p>
      <div class="etiquetas">
        <span>Arte</span>
        <span>Código</span>
        <span>Espacio</span>
      </div>
    </div>
  </body>
</html>
