<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Buenas prácticas</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        color: #222222;
        background-color: #ffffff;
        padding: 24px;
      }

      h1 {
        color: #047857;
      }

      /* Una clase reutilizable en vez de repetir estilos */
      .destacado {
        background-color: #ecfdf5;
        border-left: 4px solid #047857;
        padding: 8px 12px;
      }
    </style>
  </head>
  <body>
    <!-- Código ordenado, indentado y con nombres claros -->
    <h1>Página bien escrita</h1>

    <p class="destacado">Las etiquetas están correctamente cerradas.</p>
    <p class="destacado">El atributo alt describe cada imagen.</p>
    <p class="destacado">El CSS usa clases reutilizables.</p>
  </body>
</html>
